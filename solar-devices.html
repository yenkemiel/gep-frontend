<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>太陽能設備｜綠電管理平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body { height: 100%; font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    .sidebar { width: 220px; min-height: 100vh; background: #2B4336; flex-shrink: 0; display: flex; flex-direction: column; }
    .sidebar-brand { padding: 1.5rem 1.25rem 1rem; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.4); border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 0.5rem; }
    .sidebar-brand strong { display: block; font-size: 1rem; color: #fff; letter-spacing: -0.01em; margin-bottom: 0.2rem; }
    .nav-link-item { display: block; padding: 0.65rem 1.25rem; font-size: 0.875rem; color: rgba(255,255,255,0.6); text-decoration: none; transition: all 0.15s; }
    .nav-link-item:hover { color: #fff; background: rgba(255,255,255,0.07); }
    .nav-link-item.active { color: #fff; background: rgba(255,255,255,0.12); font-weight: 600; }
    .nav-section-label { padding: 1rem 1.25rem 0.35rem; font-size: 0.688rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
    .topbar { height: 56px; background: #fff; border-bottom: 1px solid #e8ede8; display: flex; align-items: center; justify-content: space-between; padding: 0 1.75rem; flex-shrink: 0; }
    .topbar-title { font-size: 1rem; font-weight: 600; color: #1a2e24; }
    .role-badge { font-size: 0.75rem; font-weight: 600; padding: 0.3rem 0.75rem; border-radius: 4px; background: #eef3ec; color: #2B4336; letter-spacing: 0.04em; }
    .main-content { background: #f5f6f4; flex: 1; overflow-y: auto; }
    .page-header { padding: 1.75rem 1.75rem 0; }
    .page-title { font-size: 1.4rem; font-weight: 700; color: #1a2e24; letter-spacing: -0.01em; }
    .page-subtitle { font-size: 0.875rem; color: #7a8f7a; margin-top: 0.2rem; }
    .content-card { background: #fff; border-radius: 8px; border: 1px solid #e8ede8; margin: 1.25rem 1.75rem; }
    .content-card-header { padding: 1.1rem 1.5rem; border-bottom: 1px solid #e8ede8; display: flex; align-items: center; justify-content: space-between; }
    .content-card-header h6 { font-size: 0.9rem; font-weight: 600; color: #1a2e24; margin: 0; }
    .table th { font-size: 0.8125rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #7a8f7a; border-bottom: 1px solid #e8ede8; padding: 0.85rem 1rem; background: #fafbfa; }
    .table td { font-size: 0.875rem; color: #2d3e2d; padding: 0.85rem 1rem; vertical-align: middle; border-bottom: 1px solid #f0f4f0; }
    .table tbody tr.device-row:hover { background: #fafbfa; cursor: pointer; }
    .table tbody tr:last-child td { border-bottom: none; }
    /* 狀態 badge */
    .status-badge { display: inline-block; font-size: 0.8125rem; font-weight: 600; padding: 0.25em 0.6em; border-radius: 4px; }
    .status-active { background: #d4edda; color: #155724; }
    .status-inactive { background: #e2e3e5; color: #383d41; }
    .status-maintenance { background: #fff3cd; color: #856404; }
    /* 展開面板 */
    .record-panel { background: #f8faf8; border-top: 2px solid #2B4336; padding: 1.25rem 1.5rem; }
    .record-panel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .record-panel-title { font-size: 0.8125rem; font-weight: 700; color: #2B4336; text-transform: uppercase; letter-spacing: 0.06em; }
    .record-table th { font-size: 0.8125rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #7a8f7a; padding: 0.65rem 0.85rem; background: #f0f4f0; border-bottom: 1px solid #e0e8e0; }
    .record-table td { font-size: 0.875rem; padding: 0.65rem 0.85rem; border-bottom: 1px solid #eaf0ea; vertical-align: middle; }
    /* 箭頭 */
    .expand-icon { font-size: 0.75rem; color: #7a8f7a; display: inline-block; width: 14px; text-align: center; }
    /* 按鈕 */
    .btn-primary-green { background: #2B4336; border: none; color: #fff; font-size: 0.875rem; font-weight: 600; padding: 0.5rem 1rem; border-radius: 6px; transition: background 0.15s; }
    .btn-primary-green:hover { background: #1a3028; color: #fff; }
    .btn-sm-action { font-size: 0.8125rem; padding: 0.3rem 0.65rem; border-radius: 4px; }
    /* Modal */
    .modal-header { border-bottom: 1px solid #e8ede8; padding: 1.1rem 1.5rem; }
    .modal-title { font-size: 1rem; font-weight: 600; color: #1a2e24; }
    .modal-footer { border-top: 1px solid #e8ede8; padding: 0.9rem 1.5rem; }
    .form-label { font-size: 0.8rem; font-weight: 600; color: #445c41; text-transform: uppercase; letter-spacing: 0.04em; }
    .form-control, .form-select { font-size: 0.875rem; border: 1.5px solid #d6dcd0; border-radius: 6px; }
    .form-control:focus, .form-select:focus { border-color: #2B4336; box-shadow: 0 0 0 3px rgba(43,67,54,0.1); }
    /* 年份選擇器 */
    .year-selector-wrap { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1rem; }
    .year-selector-wrap label { font-size: 0.8125rem; font-weight: 600; color: #445c41; text-transform: uppercase; letter-spacing: 0.04em; margin: 0; white-space: nowrap; }
    /* 分頁 */
    .pagination { font-size: 0.875rem; }
    .page-link { color: #2B4336; }
    .page-item.active .page-link { background: #2B4336; border-color: #2B4336; color: #fff; }
  </style>
</head>
<body>
<div class="d-flex" style="min-height:100vh;">
  <div class="sidebar">
    <div class="sidebar-brand"><strong>綠電管理平台</strong>Green Energy Platform</div>
    <div id="sidebarNav"></div>
  </div>
  <div class="d-flex flex-column flex-grow-1">
    <div class="topbar">
      <div class="topbar-title">太陽能設備管理</div>
      <div class="d-flex align-items-center gap-3">
        <span class="role-badge" id="roleDisplay"></span>
        <span style="font-size:0.875rem; color:#7a8f7a;" id="usernameDisplay"></span>
        <button class="btn btn-sm btn-outline-secondary" style="font-size:0.8rem;" onclick="doLogout()">登出</button>
      </div>
    </div>
    <div class="main-content">
      <div class="page-header">
        <div class="page-title">太陽能設備管理</div>
        <div class="page-subtitle">設備建檔與月發電紀錄追蹤，點擊列表列展開紀錄</div>
      </div>
      <div class="content-card">
        <div class="content-card-header">
          <h6>設備清單</h6>
          <div class="d-flex align-items-center gap-2">
            <select class="form-select form-select-sm" id="statusFilter" style="width:130px;" onchange="loadDevices()">
              <option value="">全部狀態</option>
              <option value="ACTIVE">ACTIVE</option>
              <option value="INACTIVE">INACTIVE</option>
            </select>
            <button class="btn btn-primary-green btn-sm d-none" id="btnCreate" onclick="openCreateDeviceModal()">+ 新增設備</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table mb-0">
            <thead>
              <tr>
                <th style="width:32px;"></th>
                <th>設備名稱</th>
                <th>裝置容量 (kW)</th>
                <th>安裝日期</th>
                <th>地點</th>
                <th>狀態</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="deviceTableBody">
              <tr><td colspan="7" class="text-center py-4 text-secondary">載入中...</td></tr>
            </tbody>
          </table>
        </div>
        <!-- 分頁 -->
        <div class="d-flex align-items-center justify-content-between px-3 py-2 border-top" style="border-color:#e8ede8 !important;">
          <span class="text-secondary" style="font-size:0.8rem;" id="pageInfo"></span>
          <nav><ul class="pagination pagination-sm mb-0" id="pagination"></ul></nav>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 新增設備 Modal（EMPLOYEE） -->
<div class="modal fade" id="createDeviceModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">新增太陽能設備</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="row g-3">
        <div class="col-12"><label class="form-label">設備名稱</label><input type="text" class="form-control" id="cd_deviceName" placeholder="輸入設備名稱"></div>
        <div class="col-6"><label class="form-label">裝置容量 (kW)</label><input type="number" class="form-control" id="cd_capacityKw" placeholder="0.00" min="0.01></div>
        <div class="col-6"><label class="form-label">安裝日期</label><input type="date" class="form-control" id="cd_installDate"></div>
        <div class="col-12"><label class="form-label">地點</label><input type="text" class="form-control" id="cd_location" placeholder="輸入設備地點"></div>
      </div>
      <div class="alert alert-danger d-none mt-3 py-2" id="createDeviceError" style="font-size:0.85rem;"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button><button class="btn btn-primary-green btn-sm" onclick="submitCreateDevice()">建立</button></div>
  </div></div>
</div>

<!-- 修改狀態 Modal（EMPLOYEE） -->
<div class="modal fade" id="statusModal" tabindex="-1">
  <div class="modal-dialog modal-sm"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">修改設備狀態</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <input type="hidden" id="s_id">
      <p class="text-secondary mb-3" style="font-size:0.875rem;">確定停用此設備？停用後無法改回。</p>
      <div class="alert alert-danger d-none py-2" id="statusError" style="font-size:0.85rem;"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button><button class="btn btn-danger btn-sm" onclick="submitStatus()">確認停用</button></div>
  </div></div>
</div>

<!-- 新增月發電紀錄 Modal（EMPLOYEE） -->
<div class="modal fade" id="createRecordModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">新增月發電紀錄</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <input type="hidden" id="cr_deviceId">
      <div class="row g-3">
        <div class="col-6"><label class="form-label">年份</label><input type="number" class="form-control" id="cr_year" placeholder="2026" min="2000" max="2100"></div>
        <div class="col-6"><label class="form-label">月份</label>
          <select class="form-select" id="cr_month">
            <option value="1">1 月</option><option value="2">2 月</option><option value="3">3 月</option>
            <option value="4">4 月</option><option value="5">5 月</option><option value="6">6 月</option>
            <option value="7">7 月</option><option value="8">8 月</option><option value="9">9 月</option>
            <option value="10">10 月</option><option value="11">11 月</option><option value="12">12 月</option>
          </select>
        </div>
        <div class="col-12"><label class="form-label">實際發電量 (kWh)</label><input type="number" class="form-control" id="cr_actualKwh" placeholder="0.00" min="0.01"></div>
      </div>
      <div class="alert alert-danger d-none mt-3 py-2" id="createRecordError" style="font-size:0.85rem;"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button><button class="btn btn-primary-green btn-sm" onclick="submitCreateRecord()">新增</button></div>
  </div></div>
</div>

<!-- 修改月發電紀錄 Modal（EMPLOYEE） -->
<div class="modal fade" id="editRecordModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">修改月發電紀錄</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <input type="hidden" id="er_deviceId"><input type="hidden" id="er_recordId">
      <p class="text-secondary mb-3" id="er_label" style="font-size:0.875rem;"></p>
      <div class="mb-3"><label class="form-label">實際發電量 (kWh)</label><input type="number" class="form-control" id="er_actualKwh" min="0.01"></div>
      <div class="alert alert-danger d-none py-2" id="editRecordError" style="font-size:0.85rem;"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button><button class="btn btn-primary-green btn-sm" onclick="submitEditRecord()">儲存</button></div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API_BASE_URL = 'https://green-energy-platform-production.up.railway.app';
  let currentPage = 0, totalPages = 0, expandedDeviceId = null;

  const token = localStorage.getItem('token');
  const role = localStorage.getItem('role');
  if (!token) window.location.href = 'login.html';
  if (role !== 'MANAGER' && role !== 'EMPLOYEE') window.location.href = 'login.html';

  document.getElementById('usernameDisplay').textContent = localStorage.getItem('username') || '';
  document.getElementById('roleDisplay').textContent = role;

  document.getElementById('sidebarNav').innerHTML = `
    <div class="nav-section-label">業務管理</div>
    <a href="targets.html" class="nav-link-item">年度目標</a>
    <a href="solar-devices.html" class="nav-link-item active">太陽能設備</a>
    <a href="contracts.html" class="nav-link-item">合約管理</a>
  `;

  if (role === 'EMPLOYEE') document.getElementById('btnCreate').classList.remove('d-none');

  function authHeaders() { return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }; }
  function doLogout() { localStorage.clear(); window.location.href = 'login.html'; }

  function statusBadge(status) {
    const map = { ACTIVE: 'status-active', INACTIVE: 'status-inactive', MAINTENANCE: 'status-maintenance' };
    return `<span class="status-badge ${map[status] || 'status-inactive'}">${status}</span>`;
  }

  // ── FR-013 載入設備清單 ──
  async function loadDevices() {
    const status = document.getElementById('statusFilter').value;
    let url = `${API_BASE_URL}/api/v1/solar-devices?page=${currentPage}&size=10`;
    if (status) url += `&status=${status}`;
    try {
      const res = await fetch(url, { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) { showTableError(data.message || '載入失敗'); return; }
      const result = data.data;
      const devices = result.content || [];
      totalPages = result.totalPages || 0;
      const tbody = document.getElementById('deviceTableBody');
      if (devices.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-secondary">目前沒有設備資料</td></tr>`;
      } else {
        tbody.innerHTML = devices.map(d => `
          <tr class="device-row" onclick="toggleRecords(${d.id})">
            <td><span class="expand-icon" id="icon-${d.id}">▶</span></td>
            <td><strong>${d.deviceName}</strong></td>
            <td>${d.capacityKw} kW</td>
            <td>${d.installDate || '-'}</td>
            <td>${d.location || '-'}</td>
            <td>${statusBadge(d.status)}</td>
            <td onclick="event.stopPropagation()">
              ${role === 'EMPLOYEE' && d.status === 'ACTIVE'
                ? `<button class="btn btn-outline-danger btn-sm btn-sm-action" onclick="openStatusModal(${d.id})">停用</button>`
                : '—'}
            </td>
          </tr>
          <tr id="records-row-${d.id}" style="display:none;">
            <td colspan="7" class="p-0">
              <div class="record-panel" id="records-panel-${d.id}"></div>
            </td>
          </tr>`).join('');
      }
      const total = result.totalElements || 0;
      document.getElementById('pageInfo').textContent = `共 ${total} 筆，第 ${currentPage + 1} / ${totalPages || 1} 頁`;
      renderPagination();
    } catch (e) { showTableError('無法連線到伺服器'); }
  }

  function showTableError(msg) {
    document.getElementById('deviceTableBody').innerHTML = `<tr><td colspan="7" class="text-center py-4 text-danger">${msg}</td></tr>`;
  }

  // ── 數字分頁 ──
  function renderPagination() {
    const ul = document.getElementById('pagination');
    ul.innerHTML = '';
    if (totalPages <= 1) return;
    const addItem = (label, page, disabled, active) => {
      const li = document.createElement('li');
      li.className = `page-item${disabled ? ' disabled' : ''}${active ? ' active' : ''}`;
      li.innerHTML = `<button class="page-link" ${disabled ? 'tabindex="-1"' : `onclick="goPage(${page})"`}>${label}</button>`;
      ul.appendChild(li);
    };
    addItem('«', currentPage - 1, currentPage === 0, false);
    // 省略號邏輯：最多顯示 5 個頁碼
    let start = Math.max(0, currentPage - 2);
    let end = Math.min(totalPages - 1, start + 4);
    if (end - start < 4) start = Math.max(0, end - 4);
    if (start > 0) { addItem('1', 0, false, false); if (start > 1) addItem('...', null, true, false); }
    for (let i = start; i <= end; i++) addItem(i + 1, i, false, i === currentPage);
    if (end < totalPages - 1) { if (end < totalPages - 2) addItem('...', null, true, false); addItem(totalPages, totalPages - 1, false, false); }
    addItem('»', currentPage + 1, currentPage >= totalPages - 1, false);
  }

  function goPage(page) { currentPage = page; loadDevices(); }

  // ── 展開 / 收合設備 ──
  async function toggleRecords(deviceId) {
    const recordsRow = document.getElementById(`records-row-${deviceId}`);
    const icon = document.getElementById(`icon-${deviceId}`);
    const isOpen = recordsRow.style.display !== 'none';
    // 收合其他已展開的
    if (expandedDeviceId && expandedDeviceId !== deviceId) {
      document.getElementById(`records-row-${expandedDeviceId}`).style.display = 'none';
      document.getElementById(`icon-${expandedDeviceId}`).textContent = '▶';
    }
    if (isOpen) {
      recordsRow.style.display = 'none';
      icon.textContent = '▶';
      expandedDeviceId = null;
    } else {
      recordsRow.style.display = '';
      icon.textContent = '▼';
      expandedDeviceId = deviceId;
      await renderRecordPanel(deviceId);
    }
  }

  // ── 渲染展開面板（先打 /years 取年份） ──
  async function renderRecordPanel(deviceId) {
    const panel = document.getElementById(`records-panel-${deviceId}`);
    panel.innerHTML = `<div class="text-secondary" style="font-size:0.875rem;">載入中...</div>`;
    try {
      const res = await fetch(`${API_BASE_URL}/api/v1/solar-devices/${deviceId}/monthly-records/years`, { headers: authHeaders() });
      const data = await res.json();
      const years = data.data || [];
      const addBtn = role === 'EMPLOYEE'
        ? `<button class="btn btn-primary-green btn-sm" onclick="openCreateRecordModal(${deviceId})">+ 新增紀錄</button>`
        : '';
      if (years.length === 0) {
        panel.innerHTML = `
          <div class="record-panel-header">
            <div class="record-panel-title">月發電紀錄</div>
            ${addBtn}
          </div>
          <div class="text-secondary" style="font-size:0.875rem;">本設備尚無發電紀錄</div>`;
        return;
      }
      const defaultYear = years[0];
      panel.innerHTML = `
        <div class="record-panel-header">
          <div class="record-panel-title">月發電紀錄</div>
          ${addBtn}
        </div>
        <div class="year-selector-wrap">
          <label>年度</label>
          <select class="form-select form-select-sm" id="year-select-${deviceId}" style="width:110px;" onchange="loadRecordsByYear(${deviceId})">
            ${years.map(y => `<option value="${y}">${y} 年</option>`).join('')}
          </select>
        </div>
        <div id="record-table-${deviceId}">載入中...</div>`;
      await loadRecordsByYear(deviceId);
    } catch (e) {
      panel.innerHTML = `<div class="text-danger" style="font-size:0.875rem;">無法載入年份資料</div>`;
    }
  }

  // ── FR-017 依年份載入月發電紀錄 ──
  async function loadRecordsByYear(deviceId) {
    const year = document.getElementById(`year-select-${deviceId}`).value;
    const container = document.getElementById(`record-table-${deviceId}`);
    container.innerHTML = `<div class="text-secondary" style="font-size:0.875rem;">載入中...</div>`;
    try {
      const res = await fetch(`${API_BASE_URL}/api/v1/solar-devices/${deviceId}/monthly-records?year=${year}`, { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) { container.innerHTML = `<div class="text-danger" style="font-size:0.875rem;">${data.message || '載入失敗'}</div>`; return; }
      const records = data.data || [];
      if (records.length === 0) {
        container.innerHTML = `<div class="text-secondary" style="font-size:0.875rem;">${year} 年尚無發電紀錄</div>`;
        return;
      }
      container.innerHTML = `
        <div class="table-responsive">
          <table class="table record-table mb-0">
            <thead><tr>
              <th>月份</th>
              <th>實際發電量 (kWh)</th>
              <th>理論發電量 (kWh)</th>
              <th>建立時間</th>
              <th>操作</th>
            </tr></thead>
            <tbody>
              ${records.map(r => `
                <tr>
                  <td><strong>${r.recordMonth} 月</strong></td>
                  <td>${Number(r.actualKwh).toLocaleString()}</td>
                  <td>${r.theoreticalKwh ? Number(r.theoreticalKwh).toLocaleString() : '-'}</td>
                  <td style="font-size:0.8rem; color:#7a8f7a;">${r.createdAt ? r.createdAt.substring(0,10) : '-'}</td>
                  <td>
                    ${role === 'EMPLOYEE'
                      ? `<button class="btn btn-outline-secondary btn-sm btn-sm-action" onclick="openEditRecordModal(${deviceId}, ${r.id}, ${r.recordYear}, ${r.recordMonth}, ${r.actualKwh})">修改</button>`
                      : '—'}
                  </td>
                </tr>`).join('')}
            </tbody>
          </table>
        </div>`;
    } catch (e) { container.innerHTML = `<div class="text-danger" style="font-size:0.875rem;">無法連線到伺服器</div>`; }
  }

  // ── FR-015 新增設備 ──
  function openCreateDeviceModal() {
    ['cd_deviceName','cd_capacityKw','cd_installDate','cd_location'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('createDeviceError').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('createDeviceModal')).show();
  }
  async function submitCreateDevice() {
    const body = {
      deviceName: document.getElementById('cd_deviceName').value.trim(),
      capacityKw: document.getElementById('cd_capacityKw').value,
      installDate: document.getElementById('cd_installDate').value,
      location: document.getElementById('cd_location').value.trim()
    };
    const errEl = document.getElementById('createDeviceError'); errEl.classList.add('d-none');
    try {
      const res = await fetch(`${API_BASE_URL}/api/v1/solar-devices`, { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.message || '建立失敗'; errEl.classList.remove('d-none'); return; }
      bootstrap.Modal.getInstance(document.getElementById('createDeviceModal')).hide();
      loadDevices();
    } catch (e) { errEl.textContent = '無法連線到伺服器'; errEl.classList.remove('d-none'); }
  }

  // ── FR-016 停用設備 ──
  function openStatusModal(id) {
    document.getElementById('s_id').value = id;
    document.getElementById('statusError').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('statusModal')).show();
  }
  async function submitStatus() {
    const id = document.getElementById('s_id').value;
    const errEl = document.getElementById('statusError'); errEl.classList.add('d-none');
    try {
      const res = await fetch(`${API_BASE_URL}/api/v1/solar-devices/${id}/status`, {
        method: 'PATCH', headers: authHeaders(), body: JSON.stringify({ status: 'INACTIVE' })
      });
      if (!res.ok) { const d = await res.json(); errEl.textContent = d.message || '修改失敗'; errEl.classList.remove('d-none'); return; }
      bootstrap.Modal.getInstance(document.getElementById('statusModal')).hide();
      loadDevices();
    } catch (e) { errEl.textContent = '無法連線到伺服器'; errEl.classList.remove('d-none'); }
  }

  // ── FR-018 新增月發電紀錄 ──
  function openCreateRecordModal(deviceId) {
    document.getElementById('cr_deviceId').value = deviceId;
    document.getElementById('cr_year').value = new Date().getFullYear();
    document.getElementById('cr_month').value = new Date().getMonth() + 1;
    document.getElementById('cr_actualKwh').value = '';
    document.getElementById('createRecordError').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('createRecordModal')).show();
  }
  async function submitCreateRecord() {
    const deviceId = document.getElementById('cr_deviceId').value;
    const body = {
      recordYear: parseInt(document.getElementById('cr_year').value),
      recordMonth: parseInt(document.getElementById('cr_month').value),
      actualKwh: document.getElementById('cr_actualKwh').value
    };
    const errEl = document.getElementById('createRecordError'); errEl.classList.add('d-none');
    try {
      const res = await fetch(`${API_BASE_URL}/api/v1/solar-devices/${deviceId}/monthly-records`, {
        method: 'POST', headers: authHeaders(), body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.message || '新增失敗'; errEl.classList.remove('d-none'); return; }
      bootstrap.Modal.getInstance(document.getElementById('createRecordModal')).hide();
      renderRecordPanel(deviceId);
    } catch (e) { errEl.textContent = '無法連線到伺服器'; errEl.classList.remove('d-none'); }
  }

  // ── FR-019 修改月發電紀錄 ──
  function openEditRecordModal(deviceId, recordId, year, month, actualKwh) {
    document.getElementById('er_deviceId').value = deviceId;
    document.getElementById('er_recordId').value = recordId;
    document.getElementById('er_label').textContent = `${year} 年 ${month} 月`;
    document.getElementById('er_actualKwh').value = actualKwh;
    document.getElementById('editRecordError').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('editRecordModal')).show();
  }
  async function submitEditRecord() {
    const deviceId = document.getElementById('er_deviceId').value;
    const recordId = document.getElementById('er_recordId').value;
    const body = { actualKwh: document.getElementById('er_actualKwh').value };
    const errEl = document.getElementById('editRecordError'); errEl.classList.add('d-none');
    try {
      const res = await fetch(`${API_BASE_URL}/api/v1/solar-devices/${deviceId}/monthly-records/${recordId}`, {
        method: 'PUT', headers: authHeaders(), body: JSON.stringify(body)
      });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.message || '修改失敗'; errEl.classList.remove('d-none'); return; }
      bootstrap.Modal.getInstance(document.getElementById('editRecordModal')).hide();
      loadRecordsByYear(deviceId);
    } catch (e) { errEl.textContent = '無法連線到伺服器'; errEl.classList.remove('d-none'); }
  }

  loadDevices();
</script>
</body>
</html>

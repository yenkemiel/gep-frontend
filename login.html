<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登入｜綠電管理平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body { height: 100%; }

    .brand-panel {
      background: linear-gradient(160deg, #1a3028 0%, #2B4336 45%, #344e41 100%);
      min-height: 100vh;
      position: relative;
      overflow: hidden;
    }

    .brand-panel::after {
      content: '';
      position: absolute;
      bottom: -120px;
      right: -120px;
      width: 380px;
      height: 380px;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 50%;
      pointer-events: none;
    }

    .brand-panel::before {
      content: '';
      position: absolute;
      top: -50px;
      right: 80px;
      width: 180px;
      height: 180px;
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 50%;
      pointer-events: none;
    }

    .form-panel {
      background: #f5f6f4;
      min-height: 100vh;
    }

    .feature-line {
      width: 2px;
      height: 46px;
      background: rgba(170,185,146,0.5);
      flex-shrink: 0;
      margin-top: 2px;
    }

    .field-input {
      border: 1.5px solid #d6dcd0;
      border-radius: 6px;
      padding: 0.8rem 1rem;
      font-size: 1rem;
      transition: border-color 0.15s;
    }

    .field-input:focus {
      border-color: #2B4336;
      box-shadow: 0 0 0 3px rgba(43,67,54,0.1);
    }

    .btn-login {
      background: #2B4336;
      border: none;
      border-radius: 6px;
      padding: 0.85rem;
      font-size: 1rem;
      font-weight: 600;
      transition: background 0.15s;
    }

    .btn-login:hover { background: #1a3028; }

    .quick-btn {
      border: 1.5px solid #d6dcd0;
      border-radius: 6px;
      padding: 0.65rem 0.25rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: #445c41;
      background: #ffffff;
      transition: all 0.15s;
    }

    .quick-btn:hover {
      border-color: #2B4336;
      color: #2B4336;
      background: #f0f4f1;
    }
  </style>
</head>
<body>

<div class="container-fluid p-0">
  <div class="row g-0" style="min-height:100vh;">

    <!-- 左側品牌區 -->
    <div class="col-6 brand-panel d-flex flex-column justify-content-between p-5">
      <div>
        <p class="text-uppercase fw-semibold mb-5" style="font-size:0.9rem; letter-spacing:0.18em; color:rgba(255,255,255,0.45);">
          Green Energy Platform
        </p>

        <h1 class="fw-bold text-white mb-3" style="font-size:3rem; letter-spacing:-0.02em; line-height:1.2;">
          綠電管理平台
        </h1>

        <p style="font-size:1.1rem; color:rgba(255,255,255,0.55); line-height:1.8;">
          整合太陽能設備、綠電合約與發電數據<br>
          協助企業落實 RE100 與永續發展目標
        </p>

        <div class="d-flex flex-column gap-4 mt-5">
          <div class="d-flex align-items-start gap-3">
            <div class="feature-line"></div>
            <div>
              <p class="fw-semibold mb-1" style="font-size:1.05rem; color:rgba(255,255,255,0.9);">太陽能設備管理</p>
              <p class="mb-0" style="font-size:0.95rem; color:rgba(255,255,255,0.45);">設備建檔與發電紀錄追蹤</p>
            </div>
          </div>
          <div class="d-flex align-items-start gap-3">
            <div class="feature-line"></div>
            <div>
              <p class="fw-semibold mb-1" style="font-size:1.05rem; color:rgba(255,255,255,0.9);">綠電合約管理</p>
              <p class="mb-0" style="font-size:0.95rem; color:rgba(255,255,255,0.45);">CPPA 與售電業合約集中管理</p>
            </div>
          </div>
          <div class="d-flex align-items-start gap-3">
            <div class="feature-line"></div>
            <div>
              <p class="fw-semibold mb-1" style="font-size:1.05rem; color:rgba(255,255,255,0.9);">權限分級控管</p>
              <p class="mb-0" style="font-size:0.95rem; color:rgba(255,255,255,0.45);">支援多角色帳號管理</p>
            </div>
          </div>
        </div>
      </div>

      <p class="mb-0" style="font-size:0.8rem; color:rgba(255,255,255,0.25);">© 2026 Green Energy Platform</p>
    </div>

    <!-- 右側登入區 -->
    <div class="col-6 form-panel d-flex align-items-center justify-content-center p-5">
      <div style="width:100%; max-width:360px;">

        <h2 class="fw-bold mb-4" style="font-size:1.75rem; color:#1a2e24; letter-spacing:-0.02em;">
          登入您的帳號
        </h2>

        <div class="alert alert-danger py-2 px-3 d-none" id="errorMsg" style="font-size:0.9rem; border-radius:6px;"></div>

        <div class="mb-3">
          <label class="form-label fw-semibold text-uppercase mb-2" style="font-size:0.85rem; letter-spacing:0.04em; color:#445c41;">帳號</label>
          <input type="text" class="form-control field-input" id="username" placeholder="輸入帳號">
        </div>

        <div class="mb-3">
          <label class="form-label fw-semibold text-uppercase mb-2" style="font-size:0.85rem; letter-spacing:0.04em; color:#445c41;">密碼</label>
          <input type="password" class="form-control field-input" id="password" placeholder="輸入密碼">
        </div>

        <button class="btn btn-login text-white w-100 mt-1" onclick="doLogin()">登入</button>

        <div class="d-flex align-items-center gap-3 my-4">
          <hr class="flex-grow-1 m-0" style="border-color:#dde3d8;">
          <span style="font-size:0.8rem; color:#9faa97; white-space:nowrap;">展示帳號</span>
          <hr class="flex-grow-1 m-0" style="border-color:#dde3d8;">
        </div>

        <div class="row g-2">
          <div class="col-4">
            <button class="quick-btn w-100" onclick="quickLogin('admin','admin123')">
              ADMIN<br><small class="text-secondary" style="font-size:0.72rem;">系統管理者</small>
            </button>
          </div>
          <div class="col-4">
            <button class="quick-btn w-100" onclick="quickLogin('manager01','newpassword123')">
              MANAGER<br><small class="text-secondary" style="font-size:0.72rem;">企業管理者</small>
            </button>
          </div>
          <div class="col-4">
            <button class="quick-btn w-100" onclick="quickLogin('employee01','Employee@123')">
              EMPLOYEE<br><small class="text-secondary" style="font-size:0.72rem;">一般員工</small>
            </button>
          </div>
        </div>

      </div>
    </div>

  </div>
</div>

<script>
  const API_BASE_URL = 'https://green-energy-platform-production.up.railway.app';

  if (localStorage.getItem('token')) {
    const role = data.data.role;
    localStorage.setItem('role', role);

    if (role === 'ADMIN') {
        window.location.href = 'users.html';
    } else if (role === 'MANAGER') {
        window.location.href = 'targets.html';
    } else {
        window.location.href = 'solar-devices.html';
    }   
  }

  function quickLogin(username, password) {
    document.getElementById('username').value = username;
    document.getElementById('password').value = password;
    doLogin();
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.classList.add('d-none');

    if (!username || !password) {
      errorMsg.textContent = '請輸入帳號與密碼。';
      errorMsg.classList.remove('d-none');
      return;
    }

    try {
      const res = await fetch(`${API_BASE_URL}/api/v1/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      const data = await res.json();

      if (res.ok && data.data && data.data.token) {
        localStorage.setItem('token', data.data.token);
        localStorage.setItem('username', data.data.username || username);
        localStorage.setItem('role', data.data.role || '');
        window.location.href = 'users.html';
      } else {
        errorMsg.textContent = data.message || '帳號或密碼錯誤，請重新輸入。';
        errorMsg.classList.remove('d-none');
      }
    } catch (e) {
      errorMsg.textContent = '無法連線到伺服器，請確認網路狀態。';
      errorMsg.classList.remove('d-none');
    }
  }

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doLogin();
  });
</script>

</body>
</html>

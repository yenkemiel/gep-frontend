<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>年度目標｜綠電管理平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body { height: 100%; font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    .sidebar { width: 220px; min-height: 100vh; background: #2B4336; flex-shrink: 0; display: flex; flex-direction: column; }
    .sidebar-brand { padding: 1.5rem 1.25rem 1rem; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.4); border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 0.5rem; }
    .sidebar-brand strong { display: block; font-size: 1rem; color: #fff; letter-spacing: -0.01em; margin-bottom: 0.2rem; }
    .nav-link-item { display: block; padding: 0.65rem 1.25rem; font-size: 0.9rem; color: rgba(255,255,255,0.6); text-decoration: none; transition: all 0.15s; }
    .nav-link-item:hover { color: #fff; background: rgba(255,255,255,0.07); }
    .nav-link-item.active { color: #fff; background: rgba(255,255,255,0.12); font-weight: 600; }
    .nav-section-label { padding: 1rem 1.25rem 0.35rem; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
    .topbar { height: 56px; background: #fff; border-bottom: 1px solid #e8ede8; display: flex; align-items: center; justify-content: space-between; padding: 0 1.75rem; flex-shrink: 0; }
    .topbar-title { font-size: 1rem; font-weight: 600; color: #1a2e24; }
    .role-badge { font-size: 0.75rem; font-weight: 600; padding: 0.3rem 0.75rem; border-radius: 4px; background: #eef3ec; color: #2B4336; letter-spacing: 0.04em; }
    .main-content { background: #f5f6f4; flex: 1; overflow-y: auto; }
    .page-header { padding: 1.75rem 1.75rem 0; }
    .page-title { font-size: 1.4rem; font-weight: 700; color: #1a2e24; letter-spacing: -0.01em; }
    .page-subtitle { font-size: 0.875rem; color: #7a8f7a; margin-top: 0.2rem; }
    .content-card { background: #fff; border-radius: 8px; border: 1px solid #e8ede8; margin: 1.25rem 1.75rem; }
    .content-card-header { padding: 1.1rem 1.5rem; border-bottom: 1px solid #e8ede8; display: flex; align-items: center; justify-content: space-between; }
    .content-card-header h6 { font-size: 0.9rem; font-weight: 600; color: #1a2e24; margin: 0; }
    .table th { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #7a8f7a; border-bottom: 1px solid #e8ede8; padding: 0.85rem 1rem; background: #fafbfa; }
    .table td { font-size: 0.9rem; color: #2d3e2d; padding: 0.85rem 1rem; vertical-align: middle; border-bottom: 1px solid #f0f4f0; }
    .table tbody tr:hover { background: #fafbfa; }
    .table tbody tr:last-child td { border-bottom: none; }
    .btn-primary-green { background: #2B4336; border: none; color: #fff; font-size: 0.875rem; font-weight: 600; padding: 0.5rem 1rem; border-radius: 6px; transition: background 0.15s; }
    .btn-primary-green:hover { background: #1a3028; color: #fff; }
    .btn-sm-action { font-size: 0.78rem; padding: 0.3rem 0.65rem; border-radius: 4px; }
    .modal-header { border-bottom: 1px solid #e8ede8; padding: 1.1rem 1.5rem; }
    .modal-title { font-size: 1rem; font-weight: 600; color: #1a2e24; }
    .modal-footer { border-top: 1px solid #e8ede8; padding: 0.9rem 1.5rem; }
    .form-label { font-size: 0.8rem; font-weight: 600; color: #445c41; text-transform: uppercase; letter-spacing: 0.04em; }
    .form-control, .form-select { font-size: 0.9rem; border: 1.5px solid #d6dcd0; border-radius: 6px; }
    .form-control:focus, .form-select:focus { border-color: #2B4336; box-shadow: 0 0 0 3px rgba(43,67,54,0.1); }
    .re100-pill { display: inline-block; padding: 0.2rem 0.6rem; border-radius: 20px; font-size: 0.78rem; font-weight: 600; background: #eef3ec; color: #2B4336; }
  </style>
</head>
<body>
<div class="d-flex" style="min-height:100vh;">
  <div class="sidebar">
    <div class="sidebar-brand"><strong>綠電管理平台</strong>Green Energy Platform</div>
    <div id="sidebarNav"></div>
  </div>
  <div class="d-flex flex-column flex-grow-1">
    <div class="topbar">
      <div class="topbar-title">年度目標管理</div>
      <div class="d-flex align-items-center gap-3">
        <span class="role-badge" id="roleDisplay"></span>
        <span style="font-size:0.875rem; color:#7a8f7a;" id="usernameDisplay"></span>
        <button class="btn btn-sm btn-outline-secondary" style="font-size:0.8rem;" onclick="doLogout()">登出</button>
      </div>
    </div>
    <div class="main-content">
      <div class="page-header">
        <div class="page-title">年度目標</div>
        <div class="page-subtitle">RE100 年度用電目標設定與管理</div>
      </div>
      <div class="content-card">
        <div class="content-card-header">
          <h6>目標清單</h6>
          <div class="d-flex align-items-center gap-2">
            <input type="number" class="form-control form-control-sm" id="yearFilter" placeholder="篩選年份" style="width:110px;" onchange="loadTargets()">
            <!-- 新增/修改/刪除只有 MANAGER -->
            <button class="btn btn-primary-green btn-sm d-none" id="btnCreate" onclick="openCreateModal()">+ 新增目標</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table mb-0">
            <thead><tr><th>ID</th><th>目標年度</th><th>年度用電量 (kWh)</th><th>RE100 目標比例</th><th>成長率</th><th>需求綠電量 (kWh)</th><th>操作</th></tr></thead>
            <tbody id="targetTableBody"><tr><td colspan="7" class="text-center py-4 text-secondary">載入中...</td></tr></tbody>
          </table>
        </div>
        <div class="d-flex align-items-center justify-content-between px-3 py-2 border-top" style="border-color:#e8ede8 !important;">
          <span class="text-secondary" style="font-size:0.8rem;" id="pageInfo"></span>
          <div class="d-flex gap-1">
            <button class="btn btn-sm btn-outline-secondary" id="prevBtn" onclick="changePage(-1)">上一頁</button>
            <button class="btn btn-sm btn-outline-secondary" id="nextBtn" onclick="changePage(1)">下一頁</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 新增 Modal -->
<div class="modal fade" id="createModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">新增年度目標</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="row g-3">
        <div class="col-6"><label class="form-label">目標年度</label><input type="number" class="form-control" id="c_targetYear" placeholder="2026"></div>
        <div class="col-6"><label class="form-label">RE100 目標比例 (%)</label><input type="number" class="form-control" id="c_re100TargetRatio" placeholder="0.00" step="0.01" min="0" max="100"></div>
        <div class="col-6"><label class="form-label">年度用電量 (kWh)</label><input type="number" class="form-control" id="c_annualElectricityKwh" placeholder="0.00"></div>
        <div class="col-6"><label class="form-label">成長率 (%)</label><input type="number" class="form-control" id="c_growthRate" placeholder="0.00" step="0.01"></div>
      </div>
      <div class="alert alert-danger d-none mt-3 py-2" id="createError" style="font-size:0.85rem;"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button><button class="btn btn-primary-green btn-sm" onclick="submitCreate()">建立</button></div>
  </div></div>
</div>

<!-- 修改 Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">修改年度目標</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <input type="hidden" id="e_id">
      <div class="row g-3">
        <div class="col-6"><label class="form-label">RE100 目標比例 (%)</label><input type="number" class="form-control" id="e_re100TargetRatio" step="0.01" min="0" max="100"></div>
        <div class="col-6"><label class="form-label">年度用電量 (kWh)</label><input type="number" class="form-control" id="e_annualElectricityKwh"></div>
        <div class="col-6"><label class="form-label">成長率 (%)</label><input type="number" class="form-control" id="e_growthRate" step="0.01"></div>
      </div>
      <div class="alert alert-danger d-none mt-3 py-2" id="editError" style="font-size:0.85rem;"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button><button class="btn btn-primary-green btn-sm" onclick="submitEdit()">儲存</button></div>
  </div></div>
</div>

<!-- 刪除確認 Modal -->
<div class="modal fade" id="deleteModal" tabindex="-1">
  <div class="modal-dialog modal-sm"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">刪除確認</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <input type="hidden" id="d_id">
      <p class="mb-0" style="font-size:0.9rem; color:#444;">確定要刪除此年度目標嗎？此操作無法復原。</p>
      <div class="alert alert-danger d-none mt-3 py-2" id="deleteError" style="font-size:0.85rem;"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button><button class="btn btn-danger btn-sm" onclick="submitDelete()">確認刪除</button></div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API_BASE_URL = 'https://green-energy-platform-production.up.railway.app';
  let currentPage = 0, totalPages = 0;

  const token = localStorage.getItem('token');
  const role = localStorage.getItem('role');
  if (!token) window.location.href = 'login.html';
  if (role !== 'MANAGER' && role !== 'EMPLOYEE') window.location.href = 'login.html';

  document.getElementById('usernameDisplay').textContent = localStorage.getItem('username') || '';
  document.getElementById('roleDisplay').textContent = role;

  document.getElementById('sidebarNav').innerHTML = `
    <div class="nav-section-label">業務管理</div>
    <a href="targets.html" class="nav-link-item active">年度目標</a>
    <a href="solar-devices.html" class="nav-link-item">太陽能設備</a>
    <a href="contracts.html" class="nav-link-item">合約管理</a>
  `;

  // 新增/修改/刪除只有 MANAGER
  if (role === 'MANAGER') document.getElementById('btnCreate').classList.remove('d-none');

  function authHeaders() { return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }; }
  function doLogout() { localStorage.clear(); window.location.href = 'login.html'; }

  async function loadTargets() {
    const year = document.getElementById('yearFilter').value;
    let url = `${API_BASE_URL}/api/v1/targets?page=${currentPage}&size=10`;
    if (year) url += `&targetYear=${year}`;
    try {
      const res = await fetch(url, { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) { showTableError(data.message || '載入失敗'); return; }
      const result = data.data;
      const targets = result.content || [];
      totalPages = result.totalPages || 0;
      const tbody = document.getElementById('targetTableBody');
      if (targets.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-secondary">目前沒有年度目標資料</td></tr>`;
      } else {
        tbody.innerHTML = targets.map(t => {
          const actions = role === 'MANAGER'
            ? `<div class="d-flex gap-1">
                <button class="btn btn-outline-secondary btn-sm btn-sm-action" onclick="openEditModal(${JSON.stringify(t).replace(/"/g, '&quot;')})">修改</button>
                <button class="btn btn-outline-danger btn-sm btn-sm-action" onclick="openDeleteModal(${t.id})">刪除</button>
               </div>`
            : '—';
          return `
            <tr>
              <td class="text-secondary">#${t.id}</td>
              <td><strong>${t.targetYear} 年</strong></td>
              <td>${Number(t.annualElectricityKwh).toLocaleString()}</td>
              <td><span class="re100-pill">${t.re100TargetRatio} %</span></td>
              <td>${t.growthRate != null ? t.growthRate + ' %' : '-'}</td>
              <td>${t.requiredGreenKwh ? Number(t.requiredGreenKwh).toLocaleString() : '-'}</td>
              <td>${actions}</td>
            </tr>`;
        }).join('');
      }
      const total = result.totalElements || 0;
      document.getElementById('pageInfo').textContent = `共 ${total} 筆，第 ${currentPage + 1} / ${totalPages || 1} 頁`;
      document.getElementById('prevBtn').disabled = currentPage === 0;
      document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
    } catch (e) { showTableError('無法連線到伺服器'); }
  }

  function showTableError(msg) { document.getElementById('targetTableBody').innerHTML = `<tr><td colspan="7" class="text-center py-4 text-danger">${msg}</td></tr>`; }
  function changePage(dir) { currentPage += dir; loadTargets(); }

  function openCreateModal() {
    ['c_targetYear','c_re100TargetRatio','c_annualElectricityKwh','c_growthRate'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('c_targetYear').value = new Date().getFullYear();
    document.getElementById('createError').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('createModal')).show();
  }
  async function submitCreate() {
    const body = { targetYear: parseInt(document.getElementById('c_targetYear').value), re100TargetRatio: document.getElementById('c_re100TargetRatio').value, annualElectricityKwh: document.getElementById('c_annualElectricityKwh').value, growthRate: document.getElementById('c_growthRate').value || null };
    const errEl = document.getElementById('createError'); errEl.classList.add('d-none');
    try {
      const res = await fetch(`${API_BASE_URL}/api/v1/targets`, { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.message || '建立失敗'; errEl.classList.remove('d-none'); return; }
      bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
      loadTargets();
    } catch (e) { errEl.textContent = '無法連線到伺服器'; errEl.classList.remove('d-none'); }
  }

  function openEditModal(t) {
    document.getElementById('e_id').value = t.id;
    document.getElementById('e_re100TargetRatio').value = t.re100TargetRatio;
    document.getElementById('e_annualElectricityKwh').value = t.annualElectricityKwh;
    document.getElementById('e_growthRate').value = t.growthRate || '';
    document.getElementById('editError').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('editModal')).show();
  }
  async function submitEdit() {
    const id = document.getElementById('e_id').value;
    const body = { re100TargetRatio: document.getElementById('e_re100TargetRatio').value, annualElectricityKwh: document.getElementById('e_annualElectricityKwh').value, growthRate: document.getElementById('e_growthRate').value || null };
    const errEl = document.getElementById('editError'); errEl.classList.add('d-none');
    try {
      const res = await fetch(`${API_BASE_URL}/api/v1/targets/${id}`, { method: 'PUT', headers: authHeaders(), body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.message || '修改失敗'; errEl.classList.remove('d-none'); return; }
      bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
      loadTargets();
    } catch (e) { errEl.textContent = '無法連線到伺服器'; errEl.classList.remove('d-none'); }
  }

  function openDeleteModal(id) {
    document.getElementById('d_id').value = id;
    document.getElementById('deleteError').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('deleteModal')).show();
  }
  async function submitDelete() {
    const id = document.getElementById('d_id').value;
    const errEl = document.getElementById('deleteError'); errEl.classList.add('d-none');
    try {
      const res = await fetch(`${API_BASE_URL}/api/v1/targets/${id}`, { method: 'DELETE', headers: authHeaders() });
      if (!res.ok) { const d = await res.json(); errEl.textContent = d.message || '刪除失敗'; errEl.classList.remove('d-none'); return; }
      bootstrap.Modal.getInstance(document.getElementById('deleteModal')).hide();
      loadTargets();
    } catch (e) { errEl.textContent = '無法連線到伺服器'; errEl.classList.remove('d-none'); }
  }

  loadTargets();
</script>
</body>
</html>

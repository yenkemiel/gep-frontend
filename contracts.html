<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>合約管理｜綠電管理平台</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    html, body { height: 100%; font-family: 'Helvetica Neue', Arial, 'PingFang TC', 'Microsoft JhengHei', sans-serif; }
    .sidebar { width: 220px; min-height: 100vh; background: #2B4336; flex-shrink: 0; display: flex; flex-direction: column; }
    .sidebar-brand { padding: 1.5rem 1.25rem 1rem; font-size: 0.75rem; font-weight: 600; letter-spacing: 0.15em; text-transform: uppercase; color: rgba(255,255,255,0.4); border-bottom: 1px solid rgba(255,255,255,0.08); margin-bottom: 0.5rem; }
    .sidebar-brand strong { display: block; font-size: 1rem; color: #fff; letter-spacing: -0.01em; margin-bottom: 0.2rem; }
    .nav-link-item { display: block; padding: 0.65rem 1.25rem; font-size: 0.9rem; color: rgba(255,255,255,0.6); text-decoration: none; transition: all 0.15s; }
    .nav-link-item:hover { color: #fff; background: rgba(255,255,255,0.07); }
    .nav-link-item.active { color: #fff; background: rgba(255,255,255,0.12); font-weight: 600; }
    .nav-section-label { padding: 1rem 1.25rem 0.35rem; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); }
    .topbar { height: 56px; background: #fff; border-bottom: 1px solid #e8ede8; display: flex; align-items: center; justify-content: space-between; padding: 0 1.75rem; flex-shrink: 0; }
    .topbar-title { font-size: 1rem; font-weight: 600; color: #1a2e24; }
    .role-badge { font-size: 0.75rem; font-weight: 600; padding: 0.3rem 0.75rem; border-radius: 4px; background: #eef3ec; color: #2B4336; letter-spacing: 0.04em; }
    .main-content { background: #f5f6f4; flex: 1; overflow-y: auto; }
    .page-header { padding: 1.75rem 1.75rem 0; }
    .page-title { font-size: 1.4rem; font-weight: 700; color: #1a2e24; letter-spacing: -0.01em; }
    .page-subtitle { font-size: 0.875rem; color: #7a8f7a; margin-top: 0.2rem; }
    .content-card { background: #fff; border-radius: 8px; border: 1px solid #e8ede8; margin: 1.25rem 1.75rem; }
    .content-card-header { padding: 1.1rem 1.5rem; border-bottom: 1px solid #e8ede8; display: flex; align-items: center; justify-content: space-between; }
    .content-card-header h6 { font-size: 0.9rem; font-weight: 600; color: #1a2e24; margin: 0; }
    .table th { font-size: 0.78rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #7a8f7a; border-bottom: 1px solid #e8ede8; padding: 0.85rem 1rem; background: #fafbfa; }
    .table td { font-size: 0.9rem; color: #2d3e2d; padding: 0.85rem 1rem; vertical-align: middle; border-bottom: 1px solid #f0f4f0; }
    .table tbody tr:hover { background: #fafbfa; cursor: pointer; }
    .table tbody tr:last-child td { border-bottom: none; }
    .btn-primary-green { background: #2B4336; border: none; color: #fff; font-size: 0.875rem; font-weight: 600; padding: 0.5rem 1rem; border-radius: 6px; transition: background 0.15s; }
    .btn-primary-green:hover { background: #1a3028; color: #fff; }
    .btn-sm-action { font-size: 0.78rem; padding: 0.3rem 0.65rem; border-radius: 4px; }
    .modal-header { border-bottom: 1px solid #e8ede8; padding: 1.1rem 1.5rem; }
    .modal-title { font-size: 1rem; font-weight: 600; color: #1a2e24; }
    .modal-footer { border-top: 1px solid #e8ede8; padding: 0.9rem 1.5rem; }
    .form-label { font-size: 0.8rem; font-weight: 600; color: #445c41; text-transform: uppercase; letter-spacing: 0.04em; }
    .form-control, .form-select { font-size: 0.9rem; border: 1.5px solid #d6dcd0; border-radius: 6px; }
    .form-control:focus, .form-select:focus { border-color: #2B4336; box-shadow: 0 0 0 3px rgba(43,67,54,0.1); }
    .detail-label { font-size: 0.78rem; color: #7a8f7a; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
    .detail-value { font-size: 0.95rem; color: #1a2e24; margin-top: 0.2rem; }
  </style>
</head>
<body>
<div class="d-flex" style="min-height:100vh;">
  <div class="sidebar">
    <div class="sidebar-brand"><strong>綠電管理平台</strong>Green Energy Platform</div>
    <div id="sidebarNav"></div>
  </div>
  <div class="d-flex flex-column flex-grow-1">
    <div class="topbar">
      <div class="topbar-title">合約管理</div>
      <div class="d-flex align-items-center gap-3">
        <span class="role-badge" id="roleDisplay"></span>
        <span style="font-size:0.875rem; color:#7a8f7a;" id="usernameDisplay"></span>
        <button class="btn btn-sm btn-outline-secondary" style="font-size:0.8rem;" onclick="doLogout()">登出</button>
      </div>
    </div>
    <div class="main-content">
      <div class="page-header">
        <div class="page-title">合約管理</div>
        <div class="page-subtitle">綠電採購合約建立、查詢與終止</div>
      </div>
      <div class="content-card">
        <div class="content-card-header">
          <h6>合約清單</h6>
          <div class="d-flex align-items-center gap-2">
            <select class="form-select form-select-sm" id="statusFilter" style="width:120px;" onchange="loadContracts()">
              <option value="">全部狀態</option>
              <option value="ACTIVE">ACTIVE</option>
              <option value="TERMINATED">TERMINATED</option>
              <option value="EXPIRED">EXPIRED</option>
            </select>
            <select class="form-select form-select-sm" id="typeFilter" style="width:130px;" onchange="loadContracts()">
              <option value="">全部類型</option>
              <option value="CPPA">CPPA</option>
              <option value="UTILITY">售電業</option>
            </select>
            <!-- 新增按鈕只有 EMPLOYEE 看得到 -->
            <button class="btn btn-primary-green btn-sm d-none" id="btnCreate" onclick="openCreateModal()">+ 新增合約</button>
          </div>
        </div>
        <div class="table-responsive">
          <table class="table mb-0">
            <thead><tr><th>ID</th><th>供應商</th><th>合約類型</th><th>月供電量 (kWh)</th><th>起訖日期</th><th>狀態</th><th>操作</th></tr></thead>
            <tbody id="contractTableBody"><tr><td colspan="7" class="text-center py-4 text-secondary">載入中...</td></tr></tbody>
          </table>
        </div>
        <div class="d-flex align-items-center justify-content-between px-3 py-2 border-top" style="border-color:#e8ede8 !important;">
          <span class="text-secondary" style="font-size:0.8rem;" id="pageInfo"></span>
          <div class="d-flex gap-1">
            <button class="btn btn-sm btn-outline-secondary" id="prevBtn" onclick="changePage(-1)">上一頁</button>
            <button class="btn btn-sm btn-outline-secondary" id="nextBtn" onclick="changePage(1)">下一頁</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 詳情 Modal -->
<div class="modal fade" id="detailModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">合約詳情</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="row g-3">
        <div class="col-6"><div class="detail-label">供應商</div><div class="detail-value" id="d_supplierName"></div></div>
        <div class="col-6"><div class="detail-label">合約類型</div><div class="detail-value" id="d_contractType"></div></div>
        <div class="col-6"><div class="detail-label">月供電量 (kWh)</div><div class="detail-value" id="d_monthlySupplyKwh"></div></div>
        <div class="col-6"><div class="detail-label">每度電費率</div><div class="detail-value" id="d_ratePerKwh"></div></div>
        <div class="col-6"><div class="detail-label">月費用試算</div><div class="detail-value" id="d_monthlyCostSnapshot"></div></div>
        <div class="col-6"><div class="detail-label">狀態</div><div class="detail-value" id="d_status"></div></div>
        <div class="col-6"><div class="detail-label">起始日期</div><div class="detail-value" id="d_startDate"></div></div>
        <div class="col-6"><div class="detail-label">結束日期</div><div class="detail-value" id="d_endDate"></div></div>
        <div class="col-12"><div class="detail-label">備註</div><div class="detail-value" id="d_notes"></div></div>
        <div class="col-6"><div class="detail-label">終止時間</div><div class="detail-value" id="d_terminatedAt"></div></div>
        <div class="col-6"><div class="detail-label">建立時間</div><div class="detail-value" id="d_createdAt"></div></div>
      </div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">關閉</button></div>
  </div></div>
</div>

<!-- 新增 Modal（EMPLOYEE） -->
<div class="modal fade" id="createModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">新增合約</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <div class="row g-3">
        <div class="col-6"><label class="form-label">供應商名稱</label><input type="text" class="form-control" id="c_supplierName" placeholder="輸入供應商名稱"></div>
        <div class="col-6"><label class="form-label">合約類型</label><select class="form-select" id="c_contractType"><option value="CPPA">CPPA</option><option value="UTILITY">售電業</option></select></div>
        <div class="col-6"><label class="form-label">月供電量 (kWh)</label><input type="number" class="form-control" id="c_monthlySupplyKwh" placeholder="0.00"></div>
        <div class="col-6"><label class="form-label">每度電費率</label><input type="number" class="form-control" id="c_ratePerKwh" placeholder="0.00"></div>
        <div class="col-6"><label class="form-label">起始日期</label><input type="date" class="form-control" id="c_startDate"></div>
        <div class="col-6"><label class="form-label">結束日期</label><input type="date" class="form-control" id="c_endDate"></div>
        <div class="col-12"><label class="form-label">備註</label><textarea class="form-control" id="c_notes" rows="2" placeholder="選填"></textarea></div>
      </div>
      <div class="alert alert-danger d-none mt-3 py-2" id="createError" style="font-size:0.85rem;"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button><button class="btn btn-primary-green btn-sm" onclick="submitCreate()">建立</button></div>
  </div></div>
</div>

<!-- 修改 Modal（EMPLOYEE） -->
<div class="modal fade" id="editModal" tabindex="-1">
  <div class="modal-dialog modal-lg"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">修改合約</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <input type="hidden" id="e_id">
      <div class="row g-3">
        <div class="col-6"><label class="form-label">供應商名稱</label><input type="text" class="form-control" id="e_supplierName"></div>
        <div class="col-6"><label class="form-label">合約類型</label><select class="form-select" id="e_contractType"><option value="CPPA">CPPA</option><option value="UTILITY">售電業</option></select></div>
        <div class="col-6"><label class="form-label">月供電量 (kWh)</label><input type="number" class="form-control" id="e_monthlySupplyKwh"></div>
        <div class="col-6"><label class="form-label">每度電費率</label><input type="number" class="form-control" id="e_ratePerKwh"></div>
        <div class="col-6"><label class="form-label">起始日期</label><input type="date" class="form-control" id="e_startDate"></div>
        <div class="col-6"><label class="form-label">結束日期</label><input type="date" class="form-control" id="e_endDate"></div>
        <div class="col-12"><label class="form-label">備註</label><textarea class="form-control" id="e_notes" rows="2"></textarea></div>
      </div>
      <div class="alert alert-danger d-none mt-3 py-2" id="editError" style="font-size:0.85rem;"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button><button class="btn btn-primary-green btn-sm" onclick="submitEdit()">儲存</button></div>
  </div></div>
</div>

<!-- 終止 Modal（MANAGER） -->
<div class="modal fade" id="terminateModal" tabindex="-1">
  <div class="modal-dialog"><div class="modal-content">
    <div class="modal-header"><h5 class="modal-title">終止合約</h5><button type="button" class="btn-close" data-bs-dismiss="modal"></button></div>
    <div class="modal-body">
      <input type="hidden" id="t_id">
      <p class="text-secondary mb-3" style="font-size:0.9rem;">此操作將終止合約，無法復原。</p>
      <div class="mb-3"><label class="form-label">終止原因</label><textarea class="form-control" id="t_reason" rows="3" placeholder="請輸入終止原因"></textarea></div>
      <div class="alert alert-danger d-none py-2" id="terminateError" style="font-size:0.85rem;"></div>
    </div>
    <div class="modal-footer"><button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">取消</button><button class="btn btn-danger btn-sm" onclick="submitTerminate()">確認終止</button></div>
  </div></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
  const API_BASE_URL = 'https://green-energy-platform-production.up.railway.app';
  let currentPage = 0, totalPages = 0;

  const token = localStorage.getItem('token');
  const role = localStorage.getItem('role');
  if (!token) window.location.href = 'login.html';
  if (role !== 'MANAGER' && role !== 'EMPLOYEE') window.location.href = 'login.html';

  document.getElementById('usernameDisplay').textContent = localStorage.getItem('username') || '';
  document.getElementById('roleDisplay').textContent = role;

  // Sidebar：MANAGER、EMPLOYEE 看業務管理
  document.getElementById('sidebarNav').innerHTML = `
    <div class="nav-section-label">業務管理</div>
    <a href="targets.html" class="nav-link-item">年度目標</a>
    <a href="solar-devices.html" class="nav-link-item">太陽能設備</a>
    <a href="contracts.html" class="nav-link-item active">合約管理</a>
  `;

  // EMPLOYEE 才能新增、修改；MANAGER 才能終止
  if (role === 'EMPLOYEE') document.getElementById('btnCreate').classList.remove('d-none');

  function authHeaders() { return { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' }; }
  function doLogout() { localStorage.clear(); window.location.href = 'login.html'; }

  function statusBadge(status) {
    const map = { ACTIVE: 'success', TERMINATED: 'danger', EXPIRED: 'secondary' };
    return `<span class="badge bg-${map[status] || 'secondary'}">${status}</span>`;
  }

  async function loadContracts() {
    const status = document.getElementById('statusFilter').value;
    const type = document.getElementById('typeFilter').value;
    let url = `${API_BASE_URL}/api/v1/contracts?page=${currentPage}&size=10`;
    if (status) url += `&status=${status}`;
    if (type) url += `&contractType=${type}`;
    try {
      const res = await fetch(url, { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) { showTableError(data.message || '載入失敗'); return; }
      const result = data.data;
      const contracts = result.content || [];
      totalPages = result.totalPages || 0;
      const tbody = document.getElementById('contractTableBody');
      if (contracts.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-secondary">目前沒有合約資料</td></tr>`;
      } else {
        tbody.innerHTML = contracts.map(c => {
          let actions = '—';
          if (c.status === 'ACTIVE') {
            const editBtn = role === 'EMPLOYEE' ? `<button class="btn btn-outline-secondary btn-sm btn-sm-action" onclick="openEditModal(${JSON.stringify(c).replace(/"/g, '&quot;')})">修改</button>` : '';
            const terminateBtn = role === 'MANAGER' ? `<button class="btn btn-outline-danger btn-sm btn-sm-action" onclick="openTerminateModal(${c.id})">終止</button>` : '';
            if (editBtn || terminateBtn) actions = `<div class="d-flex gap-1 flex-wrap">${editBtn}${terminateBtn}</div>`;
          }
          return `
            <tr onclick="openDetail(${c.id})" title="點擊查看詳情">
              <td class="text-secondary">#${c.id}</td>
              <td><strong>${c.supplierName}</strong></td>
              <td><span class="badge bg-light text-dark border">${c.contractType}</span></td>
              <td>${Number(c.monthlySupplyKwh).toLocaleString()}</td>
              <td style="font-size:0.82rem;">${c.startDate} ～ ${c.endDate}</td>
              <td>${statusBadge(c.status)}</td>
              <td onclick="event.stopPropagation()">${actions}</td>
            </tr>`;
        }).join('');
      }
      const total = result.totalElements || 0;
      document.getElementById('pageInfo').textContent = `共 ${total} 筆，第 ${currentPage + 1} / ${totalPages || 1} 頁`;
      document.getElementById('prevBtn').disabled = currentPage === 0;
      document.getElementById('nextBtn').disabled = currentPage >= totalPages - 1;
    } catch (e) { showTableError('無法連線到伺服器'); }
  }

  function showTableError(msg) { document.getElementById('contractTableBody').innerHTML = `<tr><td colspan="7" class="text-center py-4 text-danger">${msg}</td></tr>`; }
  function changePage(dir) { currentPage += dir; loadContracts(); }

  async function openDetail(id) {
    try {
      const res = await fetch(`${API_BASE_URL}/api/v1/contracts/${id}`, { headers: authHeaders() });
      const data = await res.json();
      if (!res.ok) return;
      const c = data.data;
      document.getElementById('d_supplierName').textContent = c.supplierName;
      document.getElementById('d_contractType').textContent = c.contractType;
      document.getElementById('d_monthlySupplyKwh').textContent = Number(c.monthlySupplyKwh).toLocaleString() + ' kWh';
      document.getElementById('d_ratePerKwh').textContent = c.ratePerKwh ? `NT$ ${c.ratePerKwh}` : '-';
      document.getElementById('d_monthlyCostSnapshot').textContent = c.monthlyCostSnapshot ? `NT$ ${Number(c.monthlyCostSnapshot).toLocaleString()}` : '-';
      document.getElementById('d_status').innerHTML = statusBadge(c.status);
      document.getElementById('d_startDate').textContent = c.startDate;
      document.getElementById('d_endDate').textContent = c.endDate;
      document.getElementById('d_notes').textContent = c.notes || '-';
      document.getElementById('d_terminatedAt').textContent = c.terminatedAt || '-';
      document.getElementById('d_createdAt').textContent = c.createdAt;
      new bootstrap.Modal(document.getElementById('detailModal')).show();
    } catch (e) {}
  }

  function openCreateModal() {
    ['c_supplierName','c_monthlySupplyKwh','c_ratePerKwh','c_startDate','c_endDate','c_notes'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('c_contractType').value = 'CPPA';
    document.getElementById('createError').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('createModal')).show();
  }
  async function submitCreate() {
    const body = { supplierName: document.getElementById('c_supplierName').value.trim(), contractType: document.getElementById('c_contractType').value, monthlySupplyKwh: document.getElementById('c_monthlySupplyKwh').value, ratePerKwh: document.getElementById('c_ratePerKwh').value, startDate: document.getElementById('c_startDate').value, endDate: document.getElementById('c_endDate').value, notes: document.getElementById('c_notes').value.trim() };
    const errEl = document.getElementById('createError'); errEl.classList.add('d-none');
    try {
      const res = await fetch(`${API_BASE_URL}/api/v1/contracts`, { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.message || '建立失敗'; errEl.classList.remove('d-none'); return; }
      bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
      loadContracts();
    } catch (e) { errEl.textContent = '無法連線到伺服器'; errEl.classList.remove('d-none'); }
  }

  function openEditModal(c) {
    document.getElementById('e_id').value = c.id;
    document.getElementById('e_supplierName').value = c.supplierName;
    document.getElementById('e_contractType').value = c.contractType;
    document.getElementById('e_monthlySupplyKwh').value = c.monthlySupplyKwh;
    document.getElementById('e_ratePerKwh').value = c.ratePerKwh;
    document.getElementById('e_startDate').value = c.startDate;
    document.getElementById('e_endDate').value = c.endDate;
    document.getElementById('e_notes').value = c.notes || '';
    document.getElementById('editError').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('editModal')).show();
  }
  async function submitEdit() {
    const id = document.getElementById('e_id').value;
    const body = { supplierName: document.getElementById('e_supplierName').value.trim(), contractType: document.getElementById('e_contractType').value, monthlySupplyKwh: document.getElementById('e_monthlySupplyKwh').value, ratePerKwh: document.getElementById('e_ratePerKwh').value, startDate: document.getElementById('e_startDate').value, endDate: document.getElementById('e_endDate').value, notes: document.getElementById('e_notes').value.trim() };
    const errEl = document.getElementById('editError'); errEl.classList.add('d-none');
    try {
      const res = await fetch(`${API_BASE_URL}/api/v1/contracts/${id}`, { method: 'PUT', headers: authHeaders(), body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.message || '修改失敗'; errEl.classList.remove('d-none'); return; }
      bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
      loadContracts();
    } catch (e) { errEl.textContent = '無法連線到伺服器'; errEl.classList.remove('d-none'); }
  }

  function openTerminateModal(id) {
    document.getElementById('t_id').value = id;
    document.getElementById('t_reason').value = '';
    document.getElementById('terminateError').classList.add('d-none');
    new bootstrap.Modal(document.getElementById('terminateModal')).show();
  }
  async function submitTerminate() {
    const id = document.getElementById('t_id').value;
    const body = { reason: document.getElementById('t_reason').value.trim() };
    const errEl = document.getElementById('terminateError'); errEl.classList.add('d-none');
    try {
      const res = await fetch(`${API_BASE_URL}/api/v1/contracts/${id}/terminate`, { method: 'POST', headers: authHeaders(), body: JSON.stringify(body) });
      const data = await res.json();
      if (!res.ok) { errEl.textContent = data.message || '終止失敗'; errEl.classList.remove('d-none'); return; }
      bootstrap.Modal.getInstance(document.getElementById('terminateModal')).hide();
      loadContracts();
    } catch (e) { errEl.textContent = '無法連線到伺服器'; errEl.classList.remove('d-none'); }
  }

  loadContracts();
</script>
</body>
